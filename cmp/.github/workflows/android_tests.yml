name: Android

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Build and Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
