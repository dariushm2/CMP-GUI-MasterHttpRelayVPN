name: Desktop GUI Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "gui-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish (example: gui-v1.0.0). Leave empty for build-only run."
        required: false
        type: string
      publish:
        description: "Publish GitHub release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop-gui:
    name: Build GUI for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact-path: cmp/desktopApp/build/compose/binaries/main/msi/*.msi
          - os: ubuntu-latest
            platform: linux
            artifact-path: cmp/desktopApp/build/compose/binaries/main/deb/*.deb
          - os: macos-latest
            platform: macos
            artifact-path: cmp/desktopApp/build/compose/binaries/main/dmg/*.dmg

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "jetbrains"
          java-version: "21"
          cache: "gradle"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Bundle Python Executable into Compose Resources
        shell: bash
        run: |
          python scripts/bundle_for_gui.py --force

      - name: Build Desktop Application Packages
        shell: bash
        working-directory: cmp
        run: |
          chmod +x gradlew
          ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon

      - name: Upload Native Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-gui-release:
    name: Publish GUI Release
    runs-on: ubuntu-latest
    needs: build-desktop-gui
    if: always() && !cancelled() && (startsWith(github.ref, 'refs/tags/gui-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' && startsWith(github.event.inputs.release_tag, 'gui-v')))

    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-gui-assets

      - name: Flatten directories
        run: |
          mkdir -p release-dist
          find final-gui-assets -type f -exec cp {} release-dist/ \;
          echo "Files to publish:"
          ls -lah release-dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}
          files: release-dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "GUI Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}"
